# OneAuth conformance ratchet — see docs/CONFORMANCE.md §1.
#
# Every entry here is a test that runs in CI and is currently expected to
# fail. The runner asserts:
#
#   - failing tests not in this file → regression (CI red)
#   - passing tests in this file     → ratchet up; remove the entry  (CI red)
#   - missing tests for entries here → stale manifest; entry is dead (CI red)
#
# Schema:
#   suite     — required; package basename for Go-native, suite name for external
#   id        — Go-native: full Go test name including subtest path
#   plan/test — external suites only (OIDF, MCP); paired
#   status    — must be "expected-fail"
#   issue     — required GitHub issue number tracking the gap
#   owner     — GitHub handle responsible for closing the gap
#   reason    — multi-line; what is missing and why this is filed instead of fixed
#   expires   — ISO date; advisory only (consumed by the report, not the ratchet)

- suite: introspection
  id: TestIntrospectClientAuth/post_auth_accepted
  status: expected-fail
  issue: 188
  owner: panyam
  reason: |
    apiauth/introspection.go:107 only reads `Authorization: Basic` for
    client authentication. RFC 8414 §2 token_endpoint_auth_methods_supported
    advertises both client_secret_basic AND client_secret_post for the
    AS, but the introspection endpoint rejects (401) callers that send
    credentials in the form body. Fix is to fall back to form-body
    client_id/client_secret when Basic is absent.

    NOTE: issue number 188 is a placeholder; replace with the real
    tracking issue when this PR lands.
  expires: 2026-08-07

