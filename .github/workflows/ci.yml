name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Pin actions by SHA to prevent supply chain attacks (CVE-2025-30066)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # needed for gitleaks to scan commit history

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      # Build all modules
      - name: Build (core)
        run: go build ./...

      - name: Build (sub-modules)
        run: |
          for mod in stores/gorm stores/gae saml grpc oauth2; do
            echo "Building $mod..."
            (cd $mod && go build ./...)
          done

      # Test all modules with race detector
      - name: Test (core)
        run: go test -race -count=1 -short ./...

      - name: Test (sub-modules)
        run: |
          for mod in stores/gorm stores/gae grpc oauth2; do
            echo "Testing $mod..."
            (cd $mod && go test -race -count=1 -short ./...)
          done

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Install tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: govulncheck
        run: govulncheck ./...

      - name: staticcheck
        run: staticcheck ./...

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dynamic security scan — runs ZAP against a live server
  # Only on push to main (not PRs) to avoid long CI times
  zap:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Build server
        run: go build -o build/oneauth-server ./cmd/oneauth-server/

      - name: Start server
        run: |
          PORT=19876 \
          ADMIN_AUTH_TYPE=api-key \
          ADMIN_API_KEY=ci-test-key \
          KEYSTORE_TYPE=memory \
          USER_STORES_TYPE=fs \
          USER_STORES_PATH=/tmp/oneauth-zap \
          JWT_SECRET_KEY=ci-jwt-secret-for-zap-testing \
          JWT_ISSUER=oneauth-ci \
          ./build/oneauth-server &
          # Wait for server to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:19876/_ah/health && break
            sleep 1
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@af08e42c2b62be6e5609d5c7e1b667c5ef52e57d # v0.14.0
        with:
          target: http://localhost:19876
          rules_file_name: .zap-rules.tsv
          fail_action: false # don't fail CI on findings (yet), just report
          cmd_options: '-a -j' # AJAX spider + JSON report
