{{define "content"}}
<h1 class="text-2xl font-bold mb-6">Welcome to {{.App}}</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
  <div class="bg-white shadow rounded-lg p-6">
    <h2 class="text-lg font-semibold mb-2">Your Session</h2>
    <dl class="text-sm space-y-1">
      <div class="flex justify-between"><dt class="text-gray-500">User</dt><dd>{{.User}}</dd></div>
      <div class="flex justify-between"><dt class="text-gray-500">App</dt><dd>{{.App}}</dd></div>
      <div class="flex justify-between"><dt class="text-gray-500">Client ID</dt><dd class="font-mono text-xs">{{.ClientID}}</dd></div>
    </dl>
  </div>
  <div class="bg-white shadow rounded-lg p-6">
    <h2 class="text-lg font-semibold mb-3">Relay Token</h2>
    <button onclick="getRelayToken()"
      class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 text-sm">
      Get Relay Token
    </button>
    <div id="token-display" class="mt-3 hidden">
      <label class="block text-xs font-medium text-gray-500 mb-1">JWT Token</label>
      <textarea id="token-value" readonly rows="4"
        class="w-full px-2 py-1 border rounded text-xs font-mono bg-gray-50"></textarea>
      <pre id="token-claims" class="mt-2 bg-gray-50 p-2 rounded text-xs hidden"></pre>
    </div>
  </div>
</div>

<div class="bg-white shadow rounded-lg p-6">
  <h2 class="text-lg font-semibold mb-3">Test Against Relay</h2>
  <div class="flex gap-2 mb-3">
    <input id="relay-url" type="text" value="http://localhost:4001"
      class="flex-1 px-3 py-2 border rounded-md text-sm" placeholder="Relay URL">
    <button onclick="testRelay()"
      class="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700 text-sm">
      Validate
    </button>
  </div>
  <div id="relay-result" class="hidden">
    <pre id="relay-result-body" class="bg-gray-50 p-3 rounded text-xs overflow-x-auto"></pre>
  </div>
</div>

<script>
let currentToken = '';

async function getRelayToken() {
  try {
    const resp = await fetch('/relay-token', {method: 'POST'});
    const data = await resp.json();
    if (data.error) {
      alert('Error: ' + data.error);
      return;
    }
    currentToken = data.token;
    document.getElementById('token-value').value = data.token;
    document.getElementById('token-display').classList.remove('hidden');

    // Decode JWT payload (no verification, just display)
    const parts = data.token.split('.');
    if (parts.length === 3) {
      const payload = JSON.parse(atob(parts[1]));
      const claimsEl = document.getElementById('token-claims');
      claimsEl.textContent = JSON.stringify(payload, null, 2);
      claimsEl.classList.remove('hidden');
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}

async function testRelay() {
  if (!currentToken) {
    alert('Get a relay token first');
    return;
  }
  const relayURL = document.getElementById('relay-url').value;
  try {
    const resp = await fetch(relayURL + '/validate', {
      method: 'POST',
      headers: {'Authorization': 'Bearer ' + currentToken},
    });
    const data = await resp.json();
    document.getElementById('relay-result-body').textContent = JSON.stringify(data, null, 2);
    document.getElementById('relay-result').classList.remove('hidden');
  } catch(e) {
    document.getElementById('relay-result-body').textContent = 'Error: ' + e.message;
    document.getElementById('relay-result').classList.remove('hidden');
  }
}
</script>
{{end}}
