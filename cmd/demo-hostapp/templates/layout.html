{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <span class="text-xl font-bold text-blue-600">{{.App}}</span>
      <div class="space-x-4 text-sm">
        {{if .User}}
          <span class="text-gray-600">{{.User}}</span>
          <a href="/logout" class="text-blue-600 hover:underline">Logout</a>
        {{else}}
          <a href="/login" class="text-blue-600 hover:underline">Login</a>
          <a href="/signup" class="text-blue-600 hover:underline">Sign Up</a>
        {{end}}
      </div>
    </div>
  </nav>
  <main class="max-w-4xl mx-auto px-4 py-8">
    {{if .Error}}<div class="mb-4 p-3 rounded bg-red-100 text-red-800 text-sm">{{.Error}}</div>{{end}}
    {{template "content" .}}
  </main>
</body>
</html>{{end}}
