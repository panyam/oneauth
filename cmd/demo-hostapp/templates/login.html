{{define "content"}}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-2">Login to {{.App}}</h1>
  <p class="text-sm text-gray-500 mb-6">
    This is <strong>{{.App}}</strong>'s own login page with its own user database.
    Accounts here are separate from the Auth Server and other apps.
  </p>
  <form method="POST" action="/login" class="bg-white shadow rounded-lg p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="username" required
        class="w-full px-3 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required
        class="w-full px-3 py-2 border rounded-md focus:ring-blue-500 focus:border-blue-500">
    </div>
    <button type="submit"
      class="w-full py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700">Login</button>
    <p class="text-sm text-center text-gray-500">
      No account? <a href="/signup" class="text-blue-600 hover:underline">Sign up</a>
    </p>
  </form>
</div>
{{end}}
