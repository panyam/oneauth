{{define "content"}}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">Reset Password</h1>
  {{if .Success}}
  <div class="bg-green-100 text-green-800 p-4 rounded mb-4">
    Password reset successfully. <a href="/auth/login" class="underline">Login now</a>.
  </div>
  {{else}}
  <form method="POST" action="/auth/reset-password" class="bg-white shadow rounded-lg p-6 space-y-4">
    <input type="hidden" name="token" value="{{.Token}}">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
      <input type="password" name="password" required minlength="8"
        class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
    </div>
    <button type="submit"
      class="w-full py-2 px-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
      Reset Password
    </button>
  </form>
  {{end}}
</div>
{{end}}
