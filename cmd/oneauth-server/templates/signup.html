{{define "content"}}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">Sign Up</h1>
  <form method="POST" action="/auth/signup" class="bg-white shadow rounded-lg p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="you@example.com">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required minlength="8"
        class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="Minimum 8 characters">
    </div>
    <button type="submit"
      class="w-full py-2 px-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
      Create Account
    </button>
    <p class="text-sm text-center text-gray-500">
      Already have an account? <a href="/auth/login" class="text-indigo-600 hover:underline">Login</a>
    </p>
  </form>
</div>
{{end}}
