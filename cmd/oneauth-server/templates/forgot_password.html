{{define "content"}}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-6">Forgot Password</h1>
  {{if .Sent}}
  <div class="bg-green-100 text-green-800 p-4 rounded mb-4">
    If that email exists, a reset link has been sent. Check your console output (demo mode).
  </div>
  {{end}}
  <form method="POST" action="/auth/forgot-password" class="bg-white shadow rounded-lg p-6 space-y-4">
    {{.CSRFField}}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
    </div>
    <button type="submit"
      class="w-full py-2 px-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
      Send Reset Link
    </button>
    <p class="text-sm text-center">
      <a href="/auth/login" class="text-gray-500 hover:underline">Back to login</a>
    </p>
  </form>
</div>
{{end}}
