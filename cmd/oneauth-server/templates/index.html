{{define "content"}}
<div class="text-center py-12">
  <h1 class="text-4xl font-bold text-gray-900 mb-4">OneAuth Demo</h1>
  <p class="text-lg text-gray-600 mb-8">Federated authentication for multi-tenant relay systems</p>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold mb-2">Auth Server</h2>
      <p class="text-gray-500 text-sm mb-4">User signup, login, JWT tokens, host registration</p>
      <a href="/auth/login" class="inline-block px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Login</a>
    </div>
    {{range .Services}}
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-lg font-semibold mb-2">{{.Name}}</h2>
      <p class="text-gray-500 text-sm mb-4">{{.Description}}</p>
      <a href="{{.URL}}" class="inline-block px-4 py-2 bg-gray-100 text-gray-700 rounded hover:bg-gray-200">Open</a>
    </div>
    {{end}}
  </div>
</div>
{{end}}
