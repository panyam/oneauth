{{define "content"}}
<div class="max-w-md mx-auto">
  <h1 class="text-2xl font-bold mb-2">Login</h1>
  <p class="text-sm text-gray-500 mb-6">
    Sign in to the <strong>Auth Server</strong> to view the dashboard and see registered hosts.
    This is separate from the host app accounts &mdash; each service manages its own users.
  </p>
  <form method="POST" action="/auth/login" class="bg-white shadow rounded-lg p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="username" required
        class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500"
        placeholder="you@example.com">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" name="password" required
        class="w-full px-3 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500">
    </div>
    <button type="submit"
      class="w-full py-2 px-4 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">
      Login
    </button>
    <p class="text-sm text-center text-gray-500">
      Don't have an account? <a href="/auth/signup" class="text-indigo-600 hover:underline">Sign up</a>
    </p>
    <p class="text-sm text-center">
      <a href="/auth/forgot-password" class="text-gray-500 hover:underline">Forgot password?</a>
    </p>
  </form>
</div>
{{end}}
