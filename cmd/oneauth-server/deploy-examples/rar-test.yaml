# RAR test server configuration — replaces cmd/rar-test-issuer.
# Ephemeral in-memory server with RFC 9396 Rich Authorization Requests.
#
# Usage:
#   oneauth-server --config deploy-examples/rar-test.yaml
#
# Then register test clients via DCR:
#   curl -X POST http://localhost:8181/apps/dcr \
#     -H 'Content-Type: application/json' \
#     -d '{"client_name":"rar-test-client","grant_types":["client_credentials"],"scope":"read write payments"}'
#
# Migration path: when Keycloak adds RFC 9396 RAR support on standard
# OAuth flows (keycloak/keycloak#29340), migrate interop tests to KC
# and retire this config.

server:
  port: ${RAR_ISSUER_PORT:-8181}
  host: 0.0.0.0
  # Public-facing URL used as the OIDC `iss` claim and `issuer` in AS metadata.
  # Without this, host: 0.0.0.0 leaks into iss as "http://0.0.0.0:8181",
  # which then fails iss-claim validation in tests that connect via localhost.
  # See issue 184.
  public_url: ${RAR_ISSUER_PUBLIC_URL:-http://localhost:8181}

keystore:
  type: memory

user_stores:
  type: memory

jwt:
  # Sign tokens with RS256 so the public half can be exposed via JWKS,
  # enabling remote resource servers to validate without a shared secret
  # (issue 184). secret_key stays defined for legacy code paths
  # (browser-session cookies still HS256 today) but tokens minted by the
  # /api/token endpoint use the RS256 keypair below.
  signing_alg: RS256
  # Test-only: generate a fresh RSA-2048 keypair on every startup. Tokens
  # become invalid after restart, JWKS rotates. Production deployments must
  # set jwt.private_key_path to a stable PEM file instead. The flag is
  # explicit so misconfiguration in prod fails loudly.
  ephemeral_signing_key: true
  secret_key: ${JWT_SECRET_KEY:-rar-test-secret-change-in-prod!!!!}
  issuer: ${JWT_ISSUER:-http://localhost:8181}
  authorization_details_types:
    - payment_initiation
    - account_information
    - signing_service

admin_auth:
  type: none
